# ============================================
#  自动构建 Electron 安装包并发布 Release
# ============================================
#  触发条件: 推送 v* 标签
#  需要在 GitHub Secrets 中配置:
#    - NEXT_PUBLIC_FIREBASE_API_KEY
#    - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
#    - NEXT_PUBLIC_FIREBASE_PROJECT_ID
#    - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
#    - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
#    - NEXT_PUBLIC_FIREBASE_APP_ID
#    - NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
# ============================================

name: Electron Build & Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    # 🔒 仅在原始仓库运行，防止 fork 利用 Secrets
    if: github.repository == 'YuanShiJiLoong/author'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (with Firebase config)
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
        run: npx next build

      - name: Build Electron installer
        run: npx electron-builder --win --publish never

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          # 1. 尝试读取预热好的标题
          if [ -f "RELEASE_TITLE.txt" ]; then
            TITLE_DESC=$(cat RELEASE_TITLE.txt)
          else
            TITLE_DESC=$(git log -1 --pretty=format:"%s")
          fi
          
          # 清理由于多次撰写造成的冗余版号前缀，强制规范格式
          # 移除连续出现的 "Author v1.2.8 — ", "v1.2.8: ", "Author - " 等前缀
          export TITLE_DESC
          TITLE_DESC=$(node -e "
            let t = process.env.TITLE_DESC || '';
            t = t.replace(/^(?:\s*(?:Author|v?\d+\.\d+\.\d+)\s*(?:-|—|:|\s)\s*)+/ig, '').trim();
            console.log(t);
          ")
          
          echo "title_desc=$TITLE_DESC" >> $GITHUB_OUTPUT

          # 2. 尝试读取预热好的双语详细日记
          if [ -f "RELEASE_NOTES.md" ]; then
            cp RELEASE_NOTES.md RELEASE_BODY.md
          else
            # 兼容旧逻辑：回退到拉取 commits 列表
            PREV_TAG=$(git tag --sort=-creatordate | head -n 2 | tail -n 1)
            CURR_TAG=${GITHUB_REF#refs/tags/}
            
            if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$CURR_TAG" ]; then
              NOTES=$(git log --oneline -20 --pretty=format:"- %s")
            else
              NOTES=$(git log --oneline ${PREV_TAG}..${CURR_TAG} --pretty=format:"- %s")
            fi
            
            echo "## 📋 更新内容 / Changelog" > RELEASE_BODY.md
            echo "" >> RELEASE_BODY.md
            echo "### 🇨🇳 中文" >> RELEASE_BODY.md
            echo "" >> RELEASE_BODY.md
            echo "$NOTES" >> RELEASE_BODY.md
            echo "" >> RELEASE_BODY.md
            echo "📦 下载 \`.exe\` 安装包即可使用，云同步功能已内置。" >> RELEASE_BODY.md
            echo "" >> RELEASE_BODY.md
            echo "---" >> RELEASE_BODY.md
            echo "" >> RELEASE_BODY.md
            echo "### 🇺🇸 English" >> RELEASE_BODY.md
            echo "" >> RELEASE_BODY.md
            echo "$NOTES" >> RELEASE_BODY.md
            echo "" >> RELEASE_BODY.md
            echo "📦 Download the \`.exe\` installer to get started. Cloud sync is built-in." >> RELEASE_BODY.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Author ${{ github.ref_name }} — ${{ steps.notes.outputs.title_desc }}
          body_path: RELEASE_BODY.md
          draft: false
          prerelease: false
          files: |
            dist/*.exe
            dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
